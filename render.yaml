services:
  - type: web
    name: remote-access-server
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false # Set in Render Dashboard
      - key: ADMIN_PASSWORD
        sync: false # Set in Render Dashboard
      - key: SUPABASE_URL
        sync: false # Set in Render Dashboard
      - key: SUPABASE_KEY
        sync: false # Set in Render Dashboard
    healthCheckPath: /
