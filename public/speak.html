<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Speak - Remote Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/hacker-theme.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0e17;
            color: #d0d0d0;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .app-layout {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .top-bar h1 {
            font-size: 1.1rem;
            color: #00ff41;
            margin: 0;
        }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 6px;
        }

        .back-btn:hover {
            color: #00ff41;
            border-color: rgba(0, 255, 65, 0.3);
        }

        /* ===== CARDS ===== */
        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 65, 0.12);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card label {
            display: block;
            font-size: 11px;
            color: #00ff41;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        /* ===== WALKIE-TALKIE SECTION ===== */
        .walkie-card {
            text-align: center;
            padding: 30px 20px;
        }

        .walkie-status {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            min-height: 20px;
            transition: color 0.3s;
        }

        .walkie-status.active {
            color: #ff3c78;
        }

        .walkie-status.connecting {
            color: #ffaa00;
        }

        .talk-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 60, 120, 0.08);
            border: 3px solid rgba(255, 60, 120, 0.25);
            color: #ff3c78;
            font-size: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            position: relative;
        }

        .talk-btn:hover {
            background: rgba(255, 60, 120, 0.15);
            border-color: rgba(255, 60, 120, 0.5);
            transform: scale(1.05);
        }

        .talk-btn:active,
        .talk-btn.active {
            background: rgba(255, 60, 120, 0.3);
            border-color: #ff3c78;
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(255, 60, 120, 0.3);
            animation: talkPulse 1s ease-in-out infinite;
        }

        @keyframes talkPulse {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 60, 120, 0.2);
            }

            50% {
                box-shadow: 0 0 40px rgba(255, 60, 120, 0.4);
            }
        }

        .talk-label {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== VISUALIZER ===== */
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin: 16px 0;
        }

        .vis-bar {
            width: 4px;
            border-radius: 2px;
            background: #ff3c78;
            transition: height 0.05s ease;
        }

        .walkie-timer {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ff3c78;
            min-height: 18px;
            margin-top: 8px;
        }

        /* ===== TEXT-TO-SPEECH SECTION ===== */
        .text-area {
            width: 100%;
            min-height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 65, 0.15);
            border-radius: 8px;
            padding: 12px;
            color: #d0d0d0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            resize: vertical;
        }

        .text-area:focus {
            outline: none;
            border-color: rgba(0, 255, 65, 0.4);
        }

        .text-area::placeholder {
            color: #444;
        }

        .char-count {
            text-align: right;
            font-size: 10px;
            color: #444;
            margin-top: 6px;
        }

        /* ===== CONTROLS ===== */
        .slider-group {
            margin-bottom: 12px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .slider-val {
            color: #00ff41;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #00ff41;
            height: 4px;
        }

        /* ===== BUTTONS ===== */
        .speak-btn {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(0, 200, 255, 0.25);
            border-radius: 10px;
            background: rgba(0, 200, 255, 0.06);
            color: #00c8ff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .speak-btn:hover {
            background: rgba(0, 200, 255, 0.12);
            transform: translateY(-1px);
        }

        .speak-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .speak-btn.speaking {
            animation: speakPulse 1s ease-in-out infinite;
        }

        @keyframes speakPulse {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(0, 200, 255, 0.15);
            }

            50% {
                box-shadow: 0 0 25px rgba(0, 200, 255, 0.3);
            }
        }

        /* ===== AUDIO FILE PLAYER ===== */
        .audio-file-card {
            border-color: rgba(255, 165, 0, 0.15);
        }

        .audio-file-card label {
            color: #ffaa00;
        }

        .file-drop-zone {
            border: 2px dashed rgba(255, 165, 0, 0.2);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .file-drop-zone:hover,
        .file-drop-zone.dragover {
            border-color: rgba(255, 165, 0, 0.5);
            background: rgba(255, 165, 0, 0.04);
        }

        .file-drop-zone .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .file-drop-zone .hint {
            font-size: 11px;
            color: #666;
        }

        .file-info {
            display: none;
            padding: 10px;
            background: rgba(255, 165, 0, 0.04);
            border: 1px solid rgba(255, 165, 0, 0.12);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 11px;
        }

        .file-info .name {
            color: #ffaa00;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-info .meta {
            color: #666;
        }

        .audio-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
            display: none;
        }

        .audio-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffaa00, #ff6600);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        .audio-controls {
            display: flex;
            gap: 8px;
        }

        .audio-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid rgba(255, 165, 0, 0.25);
            border-radius: 8px;
            background: rgba(255, 165, 0, 0.06);
            color: #ffaa00;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .audio-btn:hover {
            background: rgba(255, 165, 0, 0.12);
        }

        .audio-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .audio-btn.playing {
            animation: speakPulse 1s ease-in-out infinite;
            border-color: #ffaa00;
        }

        .audio-btn.stop-btn {
            border-color: rgba(255, 60, 60, 0.25);
            background: rgba(255, 60, 60, 0.06);
            color: #ff4444;
        }

        .audio-status {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-top: 8px;
            min-height: 14px;
        }

        /* ===== QUICK PHRASES ===== */
        .phrases-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .phrase-chip {
            padding: 6px 12px;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            cursor: pointer;
            color: #888;
            transition: all 0.2s;
        }

        .phrase-chip:hover {
            border-color: rgba(0, 255, 65, 0.3);
            color: #00ff41;
            background: rgba(0, 255, 65, 0.05);
        }

        /* ===== HISTORY ===== */
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            font-size: 12px;
        }

        .history-item:hover {
            background: rgba(0, 255, 65, 0.04);
        }

        .history-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 80%;
        }

        .history-time {
            font-size: 10px;
            color: #444;
            flex-shrink: 0;
        }

        .empty-history {
            font-size: 11px;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 12px;
            background: rgba(0, 255, 65, 0.15);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: rgba(255, 60, 60, 0.15);
            border-color: rgba(255, 60, 60, 0.3);
            color: #ff4444;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .app-layout {
                padding: 14px;
            }

            .talk-btn {
                width: 100px;
                height: 100px;
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <!-- Header -->
        <div class="top-bar">
            <h1>&#x1F50A; REMOTE SPEAK</h1>
            <a href="index.html" class="back-btn">&#x2190; Dashboard</a>
        </div>

        <!-- Walkie-Talkie Live Mic -->
        <div class="card walkie-card">
            <label>&#x1F399; Live Talk (Walkie-Talkie)</label>
            <div class="walkie-status" id="walkie-status">Press and hold to talk</div>
            <button class="talk-btn" id="talk-btn">&#x1F3A4;</button>
            <div class="talk-label">HOLD TO TALK</div>
            <div class="visualizer" id="visualizer"></div>
            <div class="walkie-timer" id="walkie-timer"></div>
        </div>

        <!-- Audio File Player -->
        <div class="card audio-file-card">
            <label>&#x1F3B5; Play Audio File on Device</label>
            <div class="file-drop-zone" id="file-drop-zone"
                onclick="document.getElementById('audio-file-input').click()">
                <div class="icon">&#x1F4C1;</div>
                <div>Click to select audio file</div>
                <div class="hint">MP3, WAV, OGG, M4A, FLAC — any format</div>
            </div>
            <input type="file" id="audio-file-input" accept="audio/*" style="display:none">
            <div class="file-info" id="file-info">
                <div class="name" id="file-name"></div>
                <div class="meta" id="file-meta"></div>
            </div>
            <div class="audio-progress" id="audio-progress">
                <div class="audio-progress-bar" id="audio-progress-bar"></div>
            </div>
            <div class="audio-controls">
                <button class="audio-btn" id="btn-play-audio" disabled onclick="playAudioFile()">&#x25B6; PLAY ON
                    DEVICE</button>
                <button class="audio-btn stop-btn" id="btn-stop-audio" disabled onclick="stopAudioFile()">&#x25A0;
                    STOP</button>
            </div>
            <div class="audio-status" id="audio-status"></div>
        </div>

        <!-- Text-to-Speech -->
        <div class="card">
            <label>&#x1F4AC; Text to Speech</label>
            <textarea class="text-area" id="speak-text" placeholder="Type something to speak on the device..."
                maxlength="1000"></textarea>
            <div class="char-count"><span id="char-count">0</span> / 1000</div>
        </div>

        <!-- Controls -->
        <div class="card">
            <div class="slider-group">
                <div class="slider-label">
                    <span>Volume</span>
                    <span class="slider-val" id="vol-val">100%</span>
                </div>
                <input type="range" id="volume" min="0" max="100" value="100"
                    oninput="document.getElementById('vol-val').textContent = this.value + '%'">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>Speed</span>
                    <span class="slider-val" id="spd-val">1.0x</span>
                </div>
                <input type="range" id="speed" min="25" max="300" value="100"
                    oninput="document.getElementById('spd-val').textContent = (this.value / 100).toFixed(1) + 'x'">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>Pitch</span>
                    <span class="slider-val" id="pit-val">1.0</span>
                </div>
                <input type="range" id="pitch" min="25" max="200" value="100"
                    oninput="document.getElementById('pit-val').textContent = (this.value / 100).toFixed(1)">
            </div>
        </div>

        <!-- Speak Button -->
        <button class="speak-btn" id="speak-btn" onclick="speak()">
            <span>&#x1F50A;</span> SPEAK ON DEVICE
        </button>

        <!-- Quick Phrases -->
        <div class="card">
            <label>Quick Phrases</label>
            <div class="phrases-grid">
                <div class="phrase-chip" onclick="quickSpeak('Hello, can you hear me?')">Hello!</div>
                <div class="phrase-chip" onclick="quickSpeak('Where are you right now?')">Where are you?</div>
                <div class="phrase-chip" onclick="quickSpeak('Please call me back')">Call me back</div>
                <div class="phrase-chip" onclick="quickSpeak('I am on my way')">On my way</div>
                <div class="phrase-chip" onclick="quickSpeak('Dinner is ready')">Dinner ready</div>
                <div class="phrase-chip" onclick="quickSpeak('Come home now')">Come home</div>
            </div>
        </div>

        <!-- History -->
        <div class="card">
            <label>History</label>
            <div class="history-list" id="history-list">
                <div class="empty-history">No messages yet</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/api.js"></script>
    <script src="/js/call-notification.js"></script>
    <script>
        const deviceId = new URLSearchParams(window.location.search).get('deviceId');
        if (!deviceId) window.location.href = 'index.html';

        // ========== TEXT-TO-SPEECH ==========

        let history = [];

        document.getElementById('speak-text').addEventListener('input', function () {
            document.getElementById('char-count').textContent = this.value.length;
        });

        async function speak() {
            const text = document.getElementById('speak-text').value.trim();
            if (!text) { showToast('Type something first', true); return; }

            const btn = document.getElementById('speak-btn');
            btn.disabled = true;
            btn.classList.add('speaking');
            btn.innerHTML = '<span>&#x1F50A;</span> SPEAKING...';

            try {
                await api.sendCommand(deviceId, 'speak', {
                    text,
                    volume: parseInt(document.getElementById('volume').value) / 100,
                    speed: parseInt(document.getElementById('speed').value) / 100,
                    pitch: parseInt(document.getElementById('pitch').value) / 100
                });
                showToast('Speaking on device \u{1F50A}');
                addHistory(text);
            } catch (error) {
                showToast('Error: ' + error.message, true);
            } finally {
                btn.disabled = false;
                btn.classList.remove('speaking');
                btn.innerHTML = '<span>&#x1F50A;</span> SPEAK ON DEVICE';
            }
        }

        function quickSpeak(text) {
            document.getElementById('speak-text').value = text;
            document.getElementById('char-count').textContent = text.length;
            speak();
        }

        function addHistory(text) {
            history.unshift({ text, time: new Date().toLocaleTimeString() });
            if (history.length > 20) history.pop();
            renderHistory();
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map((h, idx) => `
                <div class="history-item" data-idx="${idx}">
                    <span class="history-text">${escHtml(h.text)}</span>
                    <span class="history-time">${escHtml(h.time)}</span>
                </div>
            `).join('');
            list.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', () => {
                    const i = parseInt(el.dataset.idx);
                    if (history[i]) replayText(history[i].text);
                });
            });
        }

        function replayText(text) {
            document.getElementById('speak-text').value = text;
            document.getElementById('char-count').textContent = text.length;
        }

        document.getElementById('speak-text').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); speak(); }
        });

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        // ========== WALKIE-TALKIE (LIVE MIC \u2192 PHONE SPEAKER) ==========

        const SAMPLE_RATE = 16000; // target rate for phone
        const CHUNK_SIZE = 2048;
        const MIC_GAIN = 3.0; // 3x gain boost for louder audio
        let isTalking = false;
        let ws = null;
        let audioContext = null;
        let micStream = null;
        let scriptNode = null;
        let talkTimer = null;
        let talkStart = 0;
        let actualSampleRate = 48000; // will be detected

        const talkBtn = document.getElementById('talk-btn');
        const walkieStatus = document.getElementById('walkie-status');
        const visualizer = document.getElementById('visualizer');
        const walkieTimer = document.getElementById('walkie-timer');

        // Create visualizer bars
        function initVisualizer() {
            let bars = '';
            for (let i = 0; i < 20; i++) {
                bars += `<div class="vis-bar" style="height:4px" data-i="${i}"></div>`;
            }
            visualizer.innerHTML = bars;
        }
        initVisualizer();

        // Downsample from browser's native rate to 16kHz using linear interpolation
        function downsample(inputBuffer, inputRate, outputRate) {
            if (inputRate === outputRate) return inputBuffer;
            const ratio = inputRate / outputRate;
            const outputLength = Math.round(inputBuffer.length / ratio);
            const output = new Float32Array(outputLength);
            for (let i = 0; i < outputLength; i++) {
                const srcIndex = i * ratio;
                const low = Math.floor(srcIndex);
                const high = Math.min(low + 1, inputBuffer.length - 1);
                const frac = srcIndex - low;
                output[i] = inputBuffer[low] * (1 - frac) + inputBuffer[high] * frac;
            }
            return output;
        }

        // Convert Float32 PCM to Int16 base64
        function float32ToBase64PCM16(float32Array) {
            const pcm16 = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            const bytes = new Uint8Array(pcm16.buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        // Connect WebSocket for audio streaming
        function connectWS() {
            return new Promise((resolve, reject) => {
                const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${wsProtocol}//${location.host}`);
                ws.onopen = () => resolve();
                ws.onerror = (e) => reject(e);
                ws.onclose = () => { ws = null; };
            });
        }

        // Start talking
        async function startTalk() {
            if (isTalking) return;

            try {
                walkieStatus.textContent = '\u{1F504} Connecting...';
                walkieStatus.className = 'walkie-status connecting';

                // Get browser mic \u2014 let browser choose optimal sample rate
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                // Connect WebSocket
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    await connectWS();
                }

                // Tell device to start audio playback
                await api.sendCommand(deviceId, 'audio_play_start');

                // Create audio context � use browser's native sample rate (don't force 16kHz)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                actualSampleRate = audioContext.sampleRate;
                console.log(`[Walkie] AudioContext rate: ${actualSampleRate}Hz, target: ${SAMPLE_RATE}Hz`);

                const source = audioContext.createMediaStreamSource(micStream);

                // Gain node \u2014 boost mic volume
                const gainNode = audioContext.createGain();
                gainNode.gain.value = MIC_GAIN;

                // ScriptProcessorNode to capture and downsample PCM chunks
                scriptNode = audioContext.createScriptProcessor(4096, 1, 1);
                scriptNode.onaudioprocess = (e) => {
                    if (!isTalking || !ws || ws.readyState !== WebSocket.OPEN) return;

                    const inputData = e.inputBuffer.getChannelData(0);

                    // Downsample from native rate (e.g. 48kHz) to 16kHz
                    const downsampled = downsample(inputData, actualSampleRate, SAMPLE_RATE);
                    const base64 = float32ToBase64PCM16(downsampled);

                    // Send audio chunk to server
                    ws.send(JSON.stringify({
                        type: 'browser_audio_chunk',
                        deviceId: deviceId,
                        data: base64
                    }));

                    // Update visualizer with original data (for responsiveness)
                    updateVisualizer(inputData);
                };

                // Pipeline: mic \u2192 gain \u2192 scriptNode \u2192 silent output (NOT speakers!)
                // ScriptProcessor requires a connected output to fire onaudioprocess,
                // but we must NOT route mic audio to speakers or it causes echo.
                const silentGain = audioContext.createGain();
                silentGain.gain.value = 0; // mute — prevents echo
                source.connect(gainNode);
                gainNode.connect(scriptNode);
                scriptNode.connect(silentGain);
                silentGain.connect(audioContext.destination);

                isTalking = true;
                talkBtn.classList.add('active');
                walkieStatus.textContent = '\u{1F534} LIVE \u2022 Speaking to device...';
                walkieStatus.className = 'walkie-status active';

                // Start timer
                talkStart = Date.now();
                talkTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - talkStart) / 1000);
                    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const s = String(elapsed % 60).padStart(2, '0');
                    walkieTimer.textContent = `${m}:${s}`;
                }, 1000);

            } catch (e) {
                showToast('Mic error: ' + e.message, true);
                walkieStatus.textContent = 'Press and hold to talk';
                walkieStatus.className = 'walkie-status';
                stopTalk();
            }
        }

        // Stop talking
        async function stopTalk() {
            if (!isTalking && !micStream) return;
            isTalking = false;

            // Stop timer
            clearInterval(talkTimer);

            // Disconnect audio pipeline
            if (scriptNode) {
                scriptNode.disconnect();
                scriptNode = null;
            }
            if (audioContext) {
                audioContext.close().catch(() => { });
                audioContext = null;
            }

            // Stop mic
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
                micStream = null;
            }

            // Tell device to stop audio playback
            try {
                await api.sendCommand(deviceId, 'audio_play_stop');
            } catch (e) { /* ignore */ }

            // Close WebSocket
            if (ws) {
                ws.close();
                ws = null;
            }

            talkBtn.classList.remove('active');
            walkieStatus.textContent = 'Press and hold to talk';
            walkieStatus.className = 'walkie-status';
            walkieTimer.textContent = '';
            resetVisualizer();
        }

        // Update visualizer bars based on audio levels
        function updateVisualizer(pcmData) {
            const bars = visualizer.querySelectorAll('.vis-bar');
            const step = Math.floor(pcmData.length / bars.length);
            for (let i = 0; i < bars.length; i++) {
                let sum = 0;
                for (let j = 0; j < step; j++) {
                    sum += Math.abs(pcmData[i * step + j] || 0);
                }
                const avg = sum / step;
                const height = Math.max(4, Math.min(36, avg * 300));
                bars[i].style.height = height + 'px';
            }
        }

        function resetVisualizer() {
            visualizer.querySelectorAll('.vis-bar').forEach(b => b.style.height = '4px');
        }

        // ===== HOLD-TO-TALK EVENT HANDLERS =====

        // Mouse events
        talkBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            startTalk();
        });
        talkBtn.addEventListener('mouseup', () => stopTalk());
        talkBtn.addEventListener('mouseleave', () => { if (isTalking) stopTalk(); });

        // Touch events (mobile)
        talkBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startTalk();
        });
        talkBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopTalk();
        });
        talkBtn.addEventListener('touchcancel', () => stopTalk());

        // ========== AUDIO FILE PLAYER ==========

        let audioFileBuffer = null; // decoded AudioBuffer
        let audioFileName = '';
        let isPlayingFile = false;
        let audioFileWs = null;
        let playbackAbort = null; // AbortController for cancellation

        const fileDropZone = document.getElementById('file-drop-zone');
        const fileInput = document.getElementById('audio-file-input');
        const fileInfo = document.getElementById('file-info');
        const audioProgress = document.getElementById('audio-progress');
        const audioProgressBar = document.getElementById('audio-progress-bar');
        const audioStatusEl = document.getElementById('audio-status');
        const btnPlayAudio = document.getElementById('btn-play-audio');
        const btnStopAudio = document.getElementById('btn-stop-audio');

        // Drag & drop
        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('dragover');
        });
        fileDropZone.addEventListener('dragleave', () => fileDropZone.classList.remove('dragover'));
        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('dragover');
            const file = e.dataTransfer?.files?.[0];
            if (file && file.type.startsWith('audio/')) loadAudioFile(file);
            else showToast('Please drop an audio file', true);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files?.[0];
            if (file) loadAudioFile(file);
        });

        async function loadAudioFile(file) {
            audioFileName = file.name;
            audioStatusEl.textContent = 'Decoding audio...';
            btnPlayAudio.disabled = true;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                audioFileBuffer = await ctx.decodeAudioData(arrayBuffer);
                ctx.close();

                const duration = audioFileBuffer.duration.toFixed(1);
                const sizeKB = (file.size / 1024).toFixed(0);
                const sizeMB = (file.size / 1024 / 1024).toFixed(1);
                const sizeStr = file.size > 1048576 ? `${sizeMB} MB` : `${sizeKB} KB`;

                document.getElementById('file-name').textContent = file.name;
                document.getElementById('file-meta').textContent = `${duration}s • ${sizeStr} • ${audioFileBuffer.sampleRate}Hz`;
                fileInfo.style.display = 'block';
                fileDropZone.innerHTML = '<div class="icon">\u2705</div><div>File loaded — click to change</div>';

                btnPlayAudio.disabled = false;
                audioStatusEl.textContent = 'Ready to play';
            } catch (e) {
                showToast('Failed to decode audio: ' + e.message, true);
                audioStatusEl.textContent = 'Decode failed';
            }
        }

        async function playAudioFile() {
            if (!audioFileBuffer || isPlayingFile) return;

            isPlayingFile = true;
            playbackAbort = new AbortController();
            btnPlayAudio.disabled = true;
            btnPlayAudio.classList.add('playing');
            btnStopAudio.disabled = false;
            audioProgress.style.display = 'block';
            audioProgressBar.style.width = '0%';

            try {
                // Connect WebSocket
                const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                audioFileWs = new WebSocket(`${wsProtocol}//${location.host}`);
                await new Promise((res, rej) => {
                    audioFileWs.onopen = res;
                    audioFileWs.onerror = rej;
                });

                // Tell device to start audio playback
                await api.sendCommand(deviceId, 'audio_play_start');
                audioStatusEl.textContent = 'Playing: ' + audioFileName;

                // Get PCM data and downsample to 16kHz
                const channelData = audioFileBuffer.getChannelData(0); // mono
                const srcRate = audioFileBuffer.sampleRate;
                const targetRate = 16000;
                const ratio = srcRate / targetRate;
                const totalSamples = Math.floor(channelData.length / ratio);

                // Stream in chunks matching walkie-talkie format
                const chunkSamples = 2048; // ~128ms at 16kHz
                const totalChunks = Math.ceil(totalSamples / chunkSamples);
                const signal = playbackAbort.signal;

                for (let c = 0; c < totalChunks; c++) {
                    if (signal.aborted) break;

                    const start = c * chunkSamples;
                    const end = Math.min(start + chunkSamples, totalSamples);
                    const chunk = new Float32Array(end - start);

                    // Downsample
                    for (let i = 0; i < chunk.length; i++) {
                        const srcIdx = (start + i) * ratio;
                        const low = Math.floor(srcIdx);
                        const high = Math.min(low + 1, channelData.length - 1);
                        const frac = srcIdx - low;
                        chunk[i] = channelData[low] * (1 - frac) + channelData[high] * frac;
                    }

                    // Apply volume from slider
                    const vol = parseInt(document.getElementById('volume').value) / 100;
                    for (let i = 0; i < chunk.length; i++) {
                        chunk[i] = chunk[i] * vol;
                    }

                    // Convert to PCM16 base64
                    const pcm16 = new Int16Array(chunk.length);
                    for (let i = 0; i < chunk.length; i++) {
                        const s = Math.max(-1, Math.min(1, chunk[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    const bytes = new Uint8Array(pcm16.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    const base64 = btoa(binary);

                    // Send via WebSocket
                    if (audioFileWs.readyState === WebSocket.OPEN) {
                        audioFileWs.send(JSON.stringify({
                            type: 'browser_audio_chunk',
                            deviceId: deviceId,
                            data: base64
                        }));
                    }

                    // Update progress
                    const pct = ((c + 1) / totalChunks * 100).toFixed(1);
                    audioProgressBar.style.width = pct + '%';

                    // Pace to real-time (~128ms per chunk)
                    const chunkDurationMs = (chunk.length / targetRate) * 1000;
                    await new Promise(r => setTimeout(r, chunkDurationMs * 0.85));
                }

                // Wait for last chunk to finish playing
                if (!signal.aborted) {
                    audioStatusEl.textContent = 'Finishing playback...';
                    await new Promise(r => setTimeout(r, 1000));
                }

            } catch (e) {
                if (!playbackAbort?.signal.aborted) {
                    showToast('Playback error: ' + e.message, true);
                }
            } finally {
                // Stop device playback
                try { await api.sendCommand(deviceId, 'audio_play_stop'); } catch (e) { }
                if (audioFileWs) { audioFileWs.close(); audioFileWs = null; }

                isPlayingFile = false;
                btnPlayAudio.disabled = false;
                btnPlayAudio.classList.remove('playing');
                btnStopAudio.disabled = true;
                audioProgressBar.style.width = '100%';
                audioStatusEl.textContent = playbackAbort?.signal.aborted ? 'Stopped' : 'Done ✓';
            }
        }

        function stopAudioFile() {
            if (playbackAbort) playbackAbort.abort();
        }

        // Volume slider — controls actual device media stream volume
        let volDebounce = null;
        document.getElementById('volume').addEventListener('input', function () {
            const level = parseInt(this.value);
            clearTimeout(volDebounce);
            volDebounce = setTimeout(async () => {
                try {
                    await api.sendCommand(deviceId, 'set_device_volume', { level, stream: 'music' });
                } catch (e) { }
            }, 150);
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (isTalking) stopTalk();
            if (isPlayingFile) stopAudioFile();
        });
    </script>
</body>

</html>
