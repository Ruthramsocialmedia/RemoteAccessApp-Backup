<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Call Dialer - Remote Access</title>
    <link rel="stylesheet" href="/css/hacker-theme.css">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-display: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            padding: 0;
            min-height: 100vh;
            font-family: var(--font-display) !important;
        }

        .wrap {
            max-width: 440px;
            margin: 0 auto;
            padding: 20px 20px;
            animation: fadeInUp 0.4s ease-out;
        }

        /* ── HEADER ── */
        .pg-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .pg-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 10%, var(--accent) 50%, transparent 90%);
            opacity: 0.4;
        }

        .pg-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pg-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.12), rgba(0, 255, 65, 0.04));
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            box-shadow: 0 0 16px rgba(0, 255, 65, 0.08);
        }

        .pg-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: #e8e8e8;
        }

        .pg-title span {
            color: var(--accent);
            text-shadow: 0 0 12px rgba(0, 255, 65, 0.3);
        }

        .pg-sub {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .hdr-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 500;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hdr-btn:hover {
            color: var(--accent);
            border-color: rgba(0, 255, 65, 0.25);
            background: rgba(0, 255, 65, 0.04);
        }

        /* ── STATUS BAR ── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            margin-bottom: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .status-bar .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .status-bar.ringing {
            border-color: var(--warning);
            color: var(--warning);
            box-shadow: 0 0 12px rgba(255, 170, 0, 0.12);
            animation: pulse-warn 1.5s ease-in-out infinite;
        }

        .status-bar.ringing .status-dot {
            background: var(--warning);
            box-shadow: 0 0 6px var(--warning);
        }

        @keyframes pulse-warn {

            0%,
            100% {
                box-shadow: 0 0 4px rgba(255, 170, 0, 0.12);
            }

            50% {
                box-shadow: 0 0 18px rgba(255, 170, 0, 0.25);
            }
        }

        .status-bar.offhook {
            border-color: var(--accent-dim);
            color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .status-bar.offhook .status-dot {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        /* ── NUMBER DISPLAY ── */
        .number-display {
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-panel);
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .number-display::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            transition: width 0.3s;
        }

        .number-display.typing::before {
            width: 80%;
        }

        .number-display.typing {
            border-color: var(--accent-dim);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .number-input {
            width: 100%;
            height: 62px;
            padding: 0 16px;
            border: none;
            background: transparent;
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 1.7rem;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 10px var(--accent-glow);
            outline: none;
            caret-color: var(--accent);
            -webkit-appearance: none;
        }

        .number-input::placeholder {
            color: var(--text-muted);
            text-shadow: none;
            letter-spacing: 2px;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-style: normal;
            opacity: 0.5;
        }

        /* ── DIALPAD ── */
        .dialpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .dialpad-btn {
            height: 56px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.12s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dialpad-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 255, 65, 0.12);
            transform: translate(-50%, -50%);
            transition: width 0.35s, height 0.35s, opacity 0.35s;
            opacity: 0;
        }

        .dialpad-btn:active::after {
            width: 160px;
            height: 160px;
            opacity: 0;
        }

        .dialpad-btn:hover {
            border-color: rgba(0, 255, 65, 0.25);
            box-shadow: 0 0 8px var(--accent-glow);
            color: var(--accent);
        }

        .dialpad-btn:active {
            transform: scale(0.94);
            background: rgba(0, 255, 65, 0.08);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .dialpad-btn .sub {
            display: block;
            font-family: var(--font-display);
            font-size: 0.4rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-top: -2px;
        }

        .dialpad-btn.special {
            color: var(--accent);
            font-size: 1.1rem;
        }

        /* ── UTILITY ROW ── */
        .utility-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        /* ── ACTION BUTTONS ── */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-action {
            height: 50px;
            border: 1px solid;
            border-radius: 10px;
            font-family: var(--font-display);
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-call {
            background: rgba(0, 255, 65, 0.1);
            color: var(--accent);
            border-color: rgba(0, 255, 65, 0.25);
            grid-column: 1 / -1;
        }

        .btn-call:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-call:active {
            transform: scale(0.97);
        }

        .btn-endcall {
            background: rgba(255, 51, 51, 0.08);
            color: var(--danger);
            border-color: rgba(255, 51, 51, 0.2);
        }

        .btn-endcall:hover {
            background: rgba(255, 51, 51, 0.15);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.1);
        }

        .btn-endcall:active {
            transform: scale(0.97);
        }

        .btn-clear {
            background: var(--bg-card);
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .btn-clear:hover {
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-clear:active {
            transform: scale(0.97);
        }

        /* ── DISCLAIMER ── */
        .disc {
            margin-top: 24px;
            padding: 14px 18px;
            background: rgba(255, 170, 0, 0.03);
            border: 1px solid rgba(255, 170, 0, 0.1);
            border-radius: 10px;
        }

        .disc h4 {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-display);
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--warning);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .disc p {
            font-family: var(--font-display);
            font-size: 0.58rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ── FOOTER ── */
        .ft {
            text-align: center;
            padding: 28px 16px;
            margin-top: 24px;
            border-top: 1px solid var(--border);
        }

        .ft .ft-label {
            font-family: var(--font-display);
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .ft .ft-brand {
            display: inline-block;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: lowercase;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent), #00e5ff, var(--accent));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 6px rgba(0, 255, 65, 0.15));
            transition: all 0.4s;
        }

        .ft .ft-brand:hover {
            filter: drop-shadow(0 0 14px rgba(0, 255, 65, 0.35));
            animation: brandShine 1.5s ease infinite;
        }

        @keyframes brandShine {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .ft .ft-copy {
            font-family: var(--font-mono);
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.1);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .wrap {
                max-width: 100%;
                padding: 10px 12px;
            }

            .dialpad-btn {
                height: 52px;
                font-size: 1.2rem;
            }

            .number-input {
                font-size: 1.4rem;
                height: 54px;
            }

            .btn-action {
                height: 46px;
                font-size: 0.68rem;
            }

            .pg-sub {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">

        <!-- HEADER -->
        <div class="pg-header">
            <div class="pg-header-left">
                <div class="pg-icon"><i data-lucide="phone" style="width:18px;height:18px;"></i></div>
                <div>
                    <div class="pg-title"><span>Call</span> Dialer</div>
                    <div class="pg-sub">// remote telephony</div>
                </div>
            </div>
            <a href="index.html" class="hdr-btn">
                <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back
            </a>
        </div>

        <!-- STATUS BAR -->
        <div class="status-bar" id="call-status">
            <span class="status-dot"></span>
            <i data-lucide="phone-off" style="width:13px;height:13px;"></i>
            Idle — No Active Call
        </div>

        <!-- NUMBER DISPLAY -->
        <div class="number-display" id="number-display">
            <input type="tel" class="number-input" id="number-input" placeholder="Enter number..." autocomplete="off">
        </div>

        <!-- DIALPAD -->
        <div class="dialpad">
            <button class="dialpad-btn" onclick="addDigit('1')">1</button>
            <button class="dialpad-btn" onclick="addDigit('2')">2<span class="sub">ABC</span></button>
            <button class="dialpad-btn" onclick="addDigit('3')">3<span class="sub">DEF</span></button>
            <button class="dialpad-btn" onclick="addDigit('4')">4<span class="sub">GHI</span></button>
            <button class="dialpad-btn" onclick="addDigit('5')">5<span class="sub">JKL</span></button>
            <button class="dialpad-btn" onclick="addDigit('6')">6<span class="sub">MNO</span></button>
            <button class="dialpad-btn" onclick="addDigit('7')">7<span class="sub">PQRS</span></button>
            <button class="dialpad-btn" onclick="addDigit('8')">8<span class="sub">TUV</span></button>
            <button class="dialpad-btn" onclick="addDigit('9')">9<span class="sub">WXYZ</span></button>
            <button class="dialpad-btn special" onclick="addDigit('*')">*</button>
            <button class="dialpad-btn" onclick="addDigit('0')">0<span class="sub">+</span></button>
            <button class="dialpad-btn special" onclick="addDigit('#')">#</button>
        </div>

        <!-- UTILITY ROW -->
        <div class="utility-row">
            <button class="dialpad-btn special" onclick="addDigit('+')">+</button>
            <button class="dialpad-btn special" onclick="backspace()">
                <i data-lucide="delete" style="width:18px;height:18px;"></i>
            </button>
        </div>

        <!-- CALL / END / CLEAR -->
        <div class="action-buttons">
            <button class="btn-action btn-call" onclick="dialCall()">
                <i data-lucide="phone" style="width:16px;height:16px;"></i> Call
            </button>
        </div>

        <div class="action-buttons">
            <button class="btn-action btn-endcall" onclick="endCall()">
                <i data-lucide="phone-off" style="width:14px;height:14px;"></i> End Call
            </button>
            <button class="btn-action btn-clear" onclick="clearNumber()">
                <i data-lucide="x" style="width:14px;height:14px;"></i> Clear
            </button>
        </div>

        <!-- DISCLAIMER -->
        <div class="disc">
            <h4><i data-lucide="alert-triangle" style="width:11px;height:11px;"></i> Disclaimer</h4>
            <p>This application is intended for EDUCATIONAL AND PERSONAL USE ONLY. Installing or using this on a device
                without the owner's explicit consent is illegal and unethical.</p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="ft">
        <div class="ft-label">crafted by</div>
        <a href="https://thiyoplus-f.netlify.app/" target="_blank" class="ft-brand">thiyo-de</a>
        <div class="ft-copy">&copy; 2025 &middot; all rights reserved</div>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/call-notification.js"></script>
    <script>
        lucide.createIcons();

        const deviceId = new URLSearchParams(window.location.search).get('deviceId');
        let currentNumber = '';
        let callState = 'IDLE';

        // DTMF-like beep
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq = 700, duration = 60) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.05;
            osc.start();
            setTimeout(() => { gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); osc.stop(audioCtx.currentTime + 0.06); }, duration);
        }

        const dtmfFreqs = {
            '1': 697, '2': 770, '3': 852,
            '4': 697, '5': 770, '6': 852,
            '7': 941, '8': 941, '9': 941,
            '*': 941, '0': 941, '#': 941,
            '+': 600
        };

        function addDigit(digit) {
            currentNumber += digit;
            updateDisplay();
            playTone(dtmfFreqs[digit] || 700, 60);
        }

        function backspace() {
            currentNumber = currentNumber.slice(0, -1);
            updateDisplay();
        }

        function clearNumber() {
            currentNumber = '';
            updateDisplay();
        }

        function updateDisplay() {
            const input = document.getElementById('number-input');
            const display = document.getElementById('number-display');
            input.value = currentNumber;
            display.classList.toggle('typing', currentNumber.length > 0);
        }

        // Sync typed input
        document.getElementById('number-input').addEventListener('input', function (e) {
            currentNumber = e.target.value.replace(/[^0-9+*#\s\-()]/g, '');
            e.target.value = currentNumber;
            document.getElementById('number-display').classList.toggle('typing', currentNumber.length > 0);
        });

        // Enter key = dial
        document.getElementById('number-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); dialCall(); }
        });

        async function dialCall() {
            if (!currentNumber) { api.showToast('Please enter a phone number', 'error'); return; }
            try {
                const response = await api.sendCommand(deviceId, 'call_dial', { number: currentNumber });
                if (response.success && response.data && response.data.status === 'success') {
                    api.showToast('Dialing ' + currentNumber, 'success');
                } else {
                    throw new Error(response.error || response.data?.error || 'Failed to dial');
                }
            } catch (error) { api.showToast(error.message, 'error'); }
        }

        async function endCall() {
            try {
                const response = await api.sendCommand(deviceId, 'call_end');
                if (response.success && response.data && response.data.status === 'success') {
                    api.showToast('Call ended', 'success');
                } else {
                    throw new Error(response.error || response.data?.error || 'Failed to end call');
                }
            } catch (error) { api.showToast(error.message, 'error'); }
        }

        function syncStatusBar() {
            const overlay = document.getElementById('call-notify-overlay');
            const inner = document.getElementById('call-notify-inner');
            const statusBar = document.getElementById('call-status');
            if (!overlay || !statusBar) return;

            const isVisible = overlay.classList.contains('visible');
            const isRinging = isVisible && inner && inner.className.includes('ringing');
            const isActive = isVisible && inner && inner.className.includes('active');

            if (isRinging) {
                const numberEl = document.getElementById('cn-number');
                statusBar.innerHTML = '<span class="status-dot"></span><i data-lucide="phone-incoming" style="width:13px;height:13px;"></i> Ringing — ' + (numberEl ? numberEl.textContent : 'Incoming Call');
                statusBar.className = 'status-bar ringing';
                callState = 'RINGING';
            } else if (isActive) {
                const numberEl = document.getElementById('cn-number');
                statusBar.innerHTML = '<span class="status-dot"></span><i data-lucide="phone-call" style="width:13px;height:13px;"></i> Offhook — ' + (numberEl ? numberEl.textContent : 'Call Connected');
                statusBar.className = 'status-bar offhook';
                callState = 'OFFHOOK';
            } else {
                statusBar.innerHTML = '<span class="status-dot"></span><i data-lucide="phone-off" style="width:13px;height:13px;"></i> Idle — No Active Call';
                statusBar.className = 'status-bar';
                callState = 'IDLE';
            }
            lucide.createIcons();
        }

        setInterval(syncStatusBar, 1000);
        setTimeout(syncStatusBar, 2000);
    </script>
</body>

</html>
