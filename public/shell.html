<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shell Terminal - Remote Access</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/hacker-theme.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-display: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ===== LAYOUT ===== */
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            padding: 0;
            margin: 0;
            font-family: var(--font-display);
        }

        body::before {
            display: none;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 200;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .sidebar-header {
            padding: 14px 14px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-panel);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header .s-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.12), rgba(0, 255, 65, 0.03));
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 7px;
            color: #00ff41;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 1.5px;
            margin: 0;
            font-weight: 700;
        }

        .category {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        .category-title {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cmd-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.68rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
        }

        .cmd-btn:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 65, 0.05);
        }

        .cmd-btn:active {
            transform: scale(0.97);
        }

        .cmd-btn.primary {
            border-color: rgba(0, 255, 65, 0.15);
            color: var(--accent);
        }

        .cmd-btn.primary:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .cmd-btn.danger {
            border-color: rgba(255, 51, 51, 0.15);
            color: var(--danger);
        }

        .cmd-btn.danger:hover {
            background: rgba(255, 51, 51, 0.08);
            border-color: rgba(255, 51, 51, 0.35);
            box-shadow: 0 0 8px var(--danger-glow);
        }

        /* ===== APP PANEL ===== */
        .app-panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1999;
        }

        .app-panel-overlay.active {
            display: block;
        }

        .app-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            max-width: 90vw;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
        }

        .app-panel.open {
            right: 0;
        }

        .app-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .app-panel-header h2 {
            font-size: 0.85rem;
            color: var(--accent);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }

        .app-panel-close {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .app-panel-close:hover {
            color: #ff5252;
            background: rgba(255, 51, 51, 0.08);
            border-color: rgba(255, 51, 51, 0.2);
        }

        .app-search-box {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
        }

        .app-search-box input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 0.78rem;
            box-sizing: border-box;
        }

        .app-search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .app-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .app-loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-size: 0.75rem;
        }

        .app-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 6px;
            gap: 10px;
        }

        .app-item:hover {
            border-color: rgba(0, 255, 65, 0.2);
        }

        .app-info {
            flex: 1;
            min-width: 0;
        }

        .app-name {
            color: var(--text-primary);
            font-size: 0.78rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-package {
            color: var(--text-secondary);
            font-size: 0.62rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .app-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.62rem;
            font-family: var(--font-display);
            font-weight: 500;
            transition: all 0.15s;
        }

        .app-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .app-btn.uninstall:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .app-count {
            text-align: center;
            padding: 8px;
            color: var(--text-secondary);
            font-size: 0.65rem;
            border-bottom: 1px solid var(--border);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        header {
            padding: 10px 16px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        header::before {
            display: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hdr-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.12), rgba(0, 255, 65, 0.03));
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            color: #00ff41;
            flex-shrink: 0;
        }

        .hdr-text h1 {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            margin: 0;
            color: var(--text-primary);
            font-weight: 700;
        }

        .hdr-text p {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin: 1px 0 0 0;
            letter-spacing: 0.3px;
        }

        .btn-toggle {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
            flex-shrink: 0;
        }

        .btn-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 0.3px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* ===== TERMINAL ===== */
        .terminal-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 16px;
            background: #000;
            font-size: 0.78rem;
            line-height: 1.6;
        }

        .terminal-container::-webkit-scrollbar {
            width: 4px;
        }

        .terminal-container::-webkit-scrollbar-track {
            background: #000;
        }

        .terminal-container::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.15);
            border-radius: 2px;
        }

        /* ===== OUTPUT LINES ===== */
        .output-line {
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-all;
            padding: 1px 0;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 0.72rem;
        }

        .command-line {
            color: var(--accent);
            font-weight: bold;
            padding: 4px 0 2px 0;
            margin-top: 4px;
            border-top: 1px solid rgba(0, 255, 65, 0.06);
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 0.72rem;
        }

        .command-line .timestamp {
            color: var(--text-muted);
            font-weight: normal;
            font-size: 0.62rem;
            margin-right: 6px;
        }

        .error-line {
            color: var(--danger);
        }

        .info-line {
            color: var(--text-secondary);
            font-style: normal;
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .prompt {
            color: var(--accent);
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
            font-family: 'Courier New', monospace;
        }

        .input-area input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-input, #0d1117);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.78rem;
            min-width: 0;
        }

        .input-area input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .input-area input::placeholder {
            color: var(--text-muted);
        }

        .btn-exec {
            padding: 10px 18px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 6px;
            color: var(--accent);
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-exec:hover {
            background: rgba(0, 255, 65, 0.18);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn-exec:active {
            transform: scale(0.96);
        }

        /* ===== RESPONSIVE: TABLET ===== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 220px;
                min-width: 220px;
            }
        }

        /* ===== RESPONSIVE: MOBILE ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 199;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .terminal-container {
                font-size: 0.72rem;
                padding: 10px 12px;
            }

            .input-area {
                padding: 8px 10px;
                gap: 6px;
            }

            .input-area input {
                padding: 9px 10px;
                font-size: 0.75rem;
            }

            .btn-exec {
                padding: 9px 14px;
                font-size: 0.65rem;
            }
        }

        /* ===== RESPONSIVE: SMALL MOBILE ===== */
        @media (max-width: 480px) {
            .hdr-text h1 {
                font-size: 0.75rem;
            }

            .hdr-icon {
                width: 28px;
                height: 28px;
            }

            .terminal-container {
                font-size: 0.65rem;
                padding: 8px 10px;
            }

            .output-line,
            .command-line {
                font-size: 0.65rem;
            }

            .input-area input {
                padding: 8px;
                font-size: 0.72rem;
            }

            .btn-exec {
                padding: 8px 12px;
                font-size: 0.62rem;
                letter-spacing: 0;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="s-icon"><i data-lucide="zap" style="width:14px;height:14px;"></i></div>
            <h2>QUICK CMDS</h2>
        </div>

        <!-- Category: Accessibility -->
        <div class="category">
            <div class="category-title"><i data-lucide="accessibility" style="width:11px;height:11px;"></i>
                Accessibility (No Root)</div>
            <button class="cmd-btn primary" onclick="populate('acc click &quot;Allow&quot;')"><i
                    data-lucide="check-circle" style="width:12px;height:12px;"></i> Accept Permission</button>
            <button class="cmd-btn primary" onclick="populate('acc click &quot;While using the app&quot;')"><i
                    data-lucide="shield-check" style="width:12px;height:12px;"></i> While Using App</button>
            <button class="cmd-btn primary" onclick="populate('acc click &quot;Start now&quot;')"><i data-lucide="cast"
                    style="width:12px;height:12px;"></i> Start Casting</button>
            <button class="cmd-btn" onclick="populate('acc click &quot;TEXT_HERE&quot;')"><i
                    data-lucide="mouse-pointer-click" style="width:12px;height:12px;"></i> Custom Click...</button>
        </div>

        <!-- Category: Files -->
        <div class="category">
            <div class="category-title"><i data-lucide="folder" style="width:11px;height:11px;"></i> File Operations
            </div>
            <button class="cmd-btn" onclick="run('ls -la /sdcard')"><i data-lucide="list"
                    style="width:12px;height:12px;"></i> List /sdcard</button>
            <button class="cmd-btn" onclick="run('pwd')"><i data-lucide="map-pin" style="width:12px;height:12px;"></i>
                Current Dir</button>
            <button class="cmd-btn" onclick="populate('cat /sdcard/')"><i data-lucide="file-text"
                    style="width:12px;height:12px;"></i> Read File...</button>
            <button class="cmd-btn" onclick="populate('mkdir /sdcard/')"><i data-lucide="folder-plus"
                    style="width:12px;height:12px;"></i> Make Dir...</button>
        </div>

        <!-- Category: System -->
        <div class="category">
            <div class="category-title"><i data-lucide="cpu" style="width:11px;height:11px;"></i> System Diagnostics
            </div>
            <button class="cmd-btn" onclick="run('getprop ro.product.model && getprop ro.build.version.release')"><i
                    data-lucide="smartphone" style="width:12px;height:12px;"></i> Device Info</button>
            <button class="cmd-btn" onclick="run('df -h')"><i data-lucide="hard-drive"
                    style="width:12px;height:12px;"></i> Disk Usage</button>
            <button class="cmd-btn" onclick="run('ps -A')"><i data-lucide="activity"
                    style="width:12px;height:12px;"></i> Process List</button>
            <button class="cmd-btn" onclick="run('top -n 1')"><i data-lucide="gauge"
                    style="width:12px;height:12px;"></i> CPU Usage</button>
        </div>

        <!-- Category: Network -->
        <div class="category">
            <div class="category-title"><i data-lucide="wifi" style="width:11px;height:11px;"></i> Network</div>
            <button class="cmd-btn" onclick="run('ip addr')"><i data-lucide="globe" style="width:12px;height:12px;"></i>
                IP Address</button>
            <button class="cmd-btn" onclick="run('ping -c 3 google.com')"><i data-lucide="radio"
                    style="width:12px;height:12px;"></i> Ping Google</button>
            <button class="cmd-btn" onclick="run('cat /proc/net/tcp')"><i data-lucide="network"
                    style="width:12px;height:12px;"></i> Open Ports</button>
        </div>

        <!-- Category: Power Control -->
        <div class="category">
            <div class="category-title"><i data-lucide="power" style="width:11px;height:11px;"></i> Power Control</div>
            <button class="cmd-btn primary" onclick="sendPowerCommand('power_sleep')"><i data-lucide="moon"
                    style="width:12px;height:12px;"></i> Sleep (Screen Off)</button>
            <button class="cmd-btn primary" onclick="sendPowerCommand('power_wakeup')"><i data-lucide="sun"
                    style="width:12px;height:12px;"></i> Wake Up</button>
            <button class="cmd-btn danger" onclick="sendPowerCommand('power_lock')"><i data-lucide="lock"
                    style="width:12px;height:12px;"></i> Lock Screen</button>
            <button class="cmd-btn danger" onclick="confirmPower('power_reboot', 'Restart device?')"><i
                    data-lucide="refresh-cw" style="width:12px;height:12px;"></i> Restart</button>
            <button class="cmd-btn danger" onclick="confirmPower('power_off', 'Power off device?')"><i
                    data-lucide="power-off" style="width:12px;height:12px;"></i> Power Off</button>
        </div>

        <!-- Tools -->
        <div class="category">
            <div class="category-title"><i data-lucide="wrench" style="width:11px;height:11px;"></i> Tools</div>
            <button class="cmd-btn primary" id="btn-apps"><i data-lucide="package" style="width:12px;height:12px;"></i>
                App Manager</button>
            <button class="cmd-btn" id="btn-clear"><i data-lucide="trash-2" style="width:12px;height:12px;"></i> Clear
                Terminal</button>
        </div>
    </aside>

    <!-- APP MANAGER PANEL -->
    <div class="app-panel-overlay" id="app-panel-overlay"></div>
    <div class="app-panel" id="app-panel">
        <div class="app-panel-header">
            <h2><i data-lucide="package" style="width:16px;height:16px;"></i> App Manager</h2>
            <button class="app-panel-close" id="btn-close-apps"><i data-lucide="x"
                    style="width:16px;height:16px;"></i></button>
        </div>
        <div class="app-search-box">
            <input type="text" id="app-search" placeholder="Search apps..." autocomplete="off">
        </div>
        <div class="app-list" id="app-list">
            <div class="app-loading">Loading apps...</div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <header>
            <div class="header-left">
                <button class="btn-toggle" id="btn-sidebar" title="Toggle Sidebar"><i data-lucide="panel-left"
                        style="width:16px;height:16px;"></i></button>
                <div class="hdr-icon"><i data-lucide="terminal" style="width:16px;height:16px;"></i></div>
                <div class="hdr-text">
                    <h1>Remote Shell</h1>
                    <p>Execute commands on device</p>
                </div>
            </div>
            <a href="index.html" class="back-link"><i data-lucide="arrow-left" style="width:13px;height:13px;"></i>
                Dashboard</a>
        </header>

        <div class="terminal-container" id="terminal">
            <!-- Output goes here -->
        </div>

        <div class="input-area">
            <span class="prompt">$</span>
            <input type="text" id="command-input" placeholder="Enter command..." autofocus autocomplete="off" />
            <button class="btn-exec" id="btn-execute"><i data-lucide="play" style="width:13px;height:13px;"></i>
                Exec</button>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/smart-ui.js"></script>
    <script src="/js/call-notification.js"></script>
    <script>
        lucide.createIcons();

        const deviceId = new URLSearchParams(window.location.search).get('deviceId');
        const terminal = document.getElementById('terminal');
        const commandInput = document.getElementById('command-input');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const commandHistory = [];
        let historyIndex = -1;

        if (!deviceId) {
            window.location.href = 'index.html';
        }

        // --- Core Functions ---

        function addOutput(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'output-line error-line' :
                type === 'command' ? 'command-line' :
                    type === 'info' ? 'output-line info-line' : 'output-line';

            if (type === 'command') {
                const ts = new Date().toLocaleTimeString();
                line.innerHTML = `<span class="timestamp">[${escHtml(ts)}]</span> ${escHtml(text)}`;
            } else {
                line.textContent = text;
            }

            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function executeCommand(command) {
            if (!command || !command.trim()) return;

            commandHistory.push(command);
            historyIndex = commandHistory.length;

            addOutput(`$ ${command}`, 'command');

            try {
                const response = await api.sendCommand(deviceId, 'shell_exec', { command });
                const result = response.data || response;

                if (result.status === 'timeout') {
                    addOutput(`[Timeout] ${result.error}`, 'error');
                } else if (result.status === 'error' && result.error) {
                    addOutput(`Error: ${result.error}`, 'error');
                    if (result.stderr && result.stderr.trim()) addOutput(result.stderr, 'error');
                } else if (result.output) {
                    addOutput(result.output);
                } else if ((result.stdout && result.stdout.trim()) || (result.stderr && result.stderr.trim())) {
                    if (result.stdout && result.stdout.trim()) addOutput(result.stdout.trim());
                    if (result.stderr && result.stderr.trim()) addOutput(result.stderr.trim(), 'error');
                } else {
                    addOutput('(Command executed - no output)', 'info');
                }
            } catch (error) {
                addOutput(`Error: ${error.message}`, 'error');
            }
        }

        // --- Toolbar Helpers ---

        window.populate = function (cmd) {
            commandInput.value = cmd;
            commandInput.focus();
            closeSidebar();
        }

        window.run = function (cmd) {
            executeCommand(cmd);
            closeSidebar();
        }

        // --- Power Control ---

        async function sendPowerCommand(action) {
            addOutput(`[power] ${action}`, 'command');
            closeSidebar();
            try {
                const result = await api.sendCommand(deviceId, action, {});
                addOutput(result.message || `${action} executed`, 'info');
            } catch (error) {
                addOutput(`Error: ${error.message}`, 'error');
            }
        }

        window.confirmPower = function (action, msg) {
            if (confirm(msg)) {
                sendPowerCommand(action);
            }
        }

        // --- App Manager ---

        let allApps = [];

        function openAppPanel() {
            document.getElementById('app-panel').classList.add('open');
            document.getElementById('app-panel-overlay').classList.add('active');
            closeSidebar();
            loadApps();
        }

        function closeAppPanel() {
            document.getElementById('app-panel').classList.remove('open');
            document.getElementById('app-panel-overlay').classList.remove('active');
        }

        async function loadApps() {
            const appList = document.getElementById('app-list');
            appList.innerHTML = '<div class="app-loading">Loading apps...</div>';
            try {
                const result = await api.sendCommand(deviceId, 'apps_list', {});
                const appData = result.data || result;
                allApps = appData.data || [];
                renderApps(allApps);
            } catch (error) {
                appList.innerHTML = `<div class="app-loading">Error: ${escHtml(error.message)}</div>`;
            }
        }

        function renderApps(apps) {
            const appList = document.getElementById('app-list');
            if (!apps.length) {
                appList.innerHTML = '<div class="app-loading">No apps found</div>';
                return;
            }
            const sorted = apps.sort((a, b) => a.name.localeCompare(b.name));
            appList.innerHTML = `<div class="app-count">${sorted.length} apps</div>` +
                sorted.map(app => `
                    <div class="app-item">
                        <div class="app-info">
                            <div class="app-name">${escHtml(app.name)}</div>
                            <div class="app-package">${escHtml(app.package)} v${escHtml(app.version)}</div>
                        </div>
                        <div class="app-actions">
                            <button class="app-btn" onclick="launchApp('${escHtml(app.package)}')">Launch</button>
                            <button class="app-btn uninstall" onclick="uninstallApp('${escHtml(app.package)}', '${escHtml(app.name).replace(/'/g, "\\\'")}')">Uninstall</button>
                        </div>
                    </div>
                `).join('');
        }

        async function launchApp(pkg) {
            try {
                await api.sendCommand(deviceId, 'app_launch', { package: pkg });
                addOutput(`Launched: ${pkg}`, 'info');
            } catch (e) {
                addOutput(`Launch failed: ${e.message}`, 'error');
            }
        }

        async function uninstallApp(pkg, name) {
            if (!confirm(`Uninstall "${name}"?\n\nPackage: ${pkg}\n\nThe uninstall dialog will open on the device. You can confirm it from the Smart UI popup.`)) return;
            try {
                addOutput(`Uninstalling: ${pkg}`, 'command');
                const result = await api.sendCommand(deviceId, 'app_uninstall', { package: pkg });
                addOutput(result.message || 'Uninstall dialog triggered', 'info');
                setTimeout(() => {
                    SmartUI.show(deviceId, {
                        title: `Confirm Uninstall: ${name}`,
                        onDone: () => {
                            addOutput(`Uninstall confirmed for ${pkg}`, 'info');
                            setTimeout(() => loadApps(), 3000);
                        }
                    });
                }, 2000);
            } catch (e) {
                addOutput(`Uninstall failed: ${e.message}`, 'error');
            }
        }

        document.getElementById('app-search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allApps.filter(a => a.name.toLowerCase().includes(q) || a.package.toLowerCase().includes(q));
            renderApps(filtered);
        });

        document.getElementById('btn-apps').addEventListener('click', openAppPanel);
        document.getElementById('btn-close-apps').addEventListener('click', closeAppPanel);
        document.getElementById('app-panel-overlay').addEventListener('click', closeAppPanel);

        // --- Sidebar Toggle ---

        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
            } else {
                if (sidebar.style.display === 'none') {
                    sidebar.style.display = 'flex';
                } else {
                    sidebar.style.display = 'none';
                }
            }
        }

        // --- Event Listeners ---

        document.getElementById('btn-execute').addEventListener('click', () => {
            const command = commandInput.value;
            executeCommand(command);
            commandInput.value = '';
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            terminal.innerHTML = '';
            addOutput('Terminal cleared.', 'info');
        });

        document.getElementById('btn-sidebar').addEventListener('click', toggleSidebar);

        sidebarOverlay.addEventListener('click', closeSidebar);

        // Input History (Up/Down) & Enter
        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const command = commandInput.value;
                executeCommand(command);
                commandInput.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    commandInput.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    commandInput.value = '';
                }
            }
        });

        // Initial connection message
        addOutput('Remote Shell Terminal', 'info');
        addOutput(`Connected to: ${deviceId}`, 'info');
        addOutput('Type commands or use the sidebar quick menu.', 'info');
        addOutput('');

    </script>
</body>

</html>
